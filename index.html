<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline of the Void</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital@1&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #020204;
            background-image: linear-gradient(to bottom, #0f172a, #020204);
            color: #e0e0e0;
            font-family: 'Cinzel', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Vinheta */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, transparent 40%, #000000 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* --- TELA DE "START" (Para permitir áudio) --- */
        #enter-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 1s ease;
        }
        
        .enter-text {
            font-size: 1.5rem;
            color: #fff;
            animation: pulse 2s infinite;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        .container {
            text-align: center;
            z-index: 10;
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.3);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            width: 90%;
            max-width: 600px; /* Responsividade: não cresce demais */
            position: relative;
            backdrop-filter: blur(2px);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px rgba(180, 210, 255, 0.6);
        }

        p {
            font-family: 'Lora', serif;
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            font-style: italic;
        }

        /* Badge responsivo */
        .status-badge {
            display: inline-block;
            padding: 10px 25px;
            border: 1px solid #a4b9d6;
            color: #a4b9d6;
            text-decoration: none;
            transition: all 0.4s ease;
            font-weight: 700;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.4);
        }

        .status-badge:hover {
            background-color: #a4b9d6;
            color: #020204;
            box-shadow: 0 0 20px rgba(164, 185, 214, 0.4);
        }

        /* --- FOOTER --- */
        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            z-index: 20;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 1px;
        }

        footer a {
            color: #777;
            text-decoration: none;
            border-bottom: 1px dotted #555;
        }

        /* --- ANIMAÇÕES E RESPONSIVIDADE --- */
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; text-shadow: 0 0 15px white; }
            100% { opacity: 0.4; }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; letter-spacing: 2px; }
            .container { padding: 1.5rem; width: 95%; }
            p { font-size: 1rem; }
            footer { font-size: 0.7rem; bottom: 10px; }
        }

        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 10s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(20px); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="theme.mp3" type="audio/mpeg">
        Seu navegador não suporta áudio.
    </audio>

    <div id="enter-screen" onclick="enterSite()">
        <div class="enter-text">Clique para Entrar</div>
    </div>

    <div class="particle" style="left: 10%; animation-duration: 8s;"></div>
    <div class="particle" style="left: 30%; animation-duration: 12s;"></div>
    <div class="particle" style="left: 70%; animation-duration: 7s;"></div>
    <div class="particle" style="left: 90%; animation-duration: 15s;"></div>

    <div class="container">
        <h1>Vessel v1.0</h1>
        <p>"No cost too great. No mind to think. No will to break."</p>
        
        <div class="status-badge">
            PIPELINE CONNECTED
        </div>
    </div>

    <footer>
        <p>Desenvolvido por Levy | <a href="https://github.com/SEU_USUARIO" target="_blank">Ver no GitHub</a></p>
        <p style="margin-top: 5px; font-size: 0.6rem; opacity: 0.5;">SI / UNINASSAU</p>
    </footer>

    <script>
        // Função para iniciar o áudio e remover a tela preta
        function enterSite() {
            var audio = document.getElementById("bg-music");
            var screen = document.getElementById("enter-screen");

            // Tenta tocar o áudio
            audio.play().catch(function(error) {
                console.log("Erro ao reproduzir áudio:", error);
            });

            // Efeito de desaparecimento (Fade out)
            screen.style.opacity = "0";
            
            // Remove o elemento da tela depois de 1 segundo
            setTimeout(function() {
                screen.style.display = "none";
            }, 1000);
        }
    </script>
</body>
</html>
